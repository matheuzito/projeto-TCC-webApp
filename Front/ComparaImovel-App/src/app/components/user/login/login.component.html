<div class="login-wrapper d-flex align-items-center justify-content-center vh-100">

    <div class="login-card shadow-lg bg-white p-5 text-center">
        
        <form class="form-signin w-100" [formGroup]="frmLogin" (ngSubmit)="realizarLogin()">
            
            <img src="../../../assets/img/Logomarca.png" class="mb-4 logo-img" alt="Logomarca da Empresa">
            <h1 class="h4 mb-4 fw-bold text-secondary">Acesso Restrito</h1>

            <div class="form-floating mb-3 text-start">
                <input type="text" 
                       formControlName="userName" 
                       id="userName" 
                       class="form-control" 
                       placeholder="Usuário" 
                       [ngClass]="cssValidator(f.userName)" />
                <label for="userName" class="text-muted">Usuário</label>
                
                @if (f.userName.errors?.required && f.userName.touched) {
                    <div class="invalid-feedback d-block mt-1">
                        O Usuário é obrigatório.
                    </div>
                }
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" 
                       formControlName="password" 
                       id="password" 
                       class="form-control" 
                       placeholder="Senha" 
                       [ngClass]="cssValidator(f.password)" />
                <label for="password" class="text-muted">Senha</label>
                
                @if (f.password.errors?.required && f.password.touched) {
                    <div class="invalid-feedback d-block mt-1">
                        A senha é obrigatória.
                    </div>
                }
                @if (f.password.errors?.minlength && f.password.touched) {
                    <div class="invalid-feedback d-block mt-1">
                        A senha deve ter no mínimo 4 caracteres.
                    </div>
                }
            </div>

            <button class="btn btn-primary btn-lg w-100 login-btn mt-2"
                    [disabled]="!frmLogin.valid" 
                    type="submit">
                Entrar
            </button>
            
        </form>
    </div>
</div>
